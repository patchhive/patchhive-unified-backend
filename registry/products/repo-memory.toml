key = "repo-memory"
code = "RM"
name = "RepoMemory"
role = "durable repo memory and prompt packs"
module_path = "crate::products::repo_memory"
route_prefix = "/api/products/repo-memory"
migration_stage = "not-started"

[safety]
read_only = false
writes_external_state = false
requires_operator_approval = false
credential_scopes = ["github:repo:read", "github:pull_requests:read", "github:issues:read"]
evidence_required = ["repo identity", "source event", "memory summary"]

[[capabilities]]
id = "memory-ingest"
label = "Memory ingest"
description = "Extract durable repo memories from history and feedback."

[[capabilities]]
id = "prompt-pack"
label = "Prompt pack"
description = "Generate context packs for downstream agents."

[[capabilities]]
id = "failguard"
label = "FailGuard"
description = "Queue and promote lessons from painful outcomes."

[[routes]]
method = "GET"
path = "/api/products/repo-memory/health"
description = "Report RepoMemory runtime health."

[[routes]]
method = "POST"
path = "/api/products/repo-memory/prompt-pack"
description = "Generate a repo prompt pack."

[[routes]]
method = "GET"
path = "/api/products/repo-memory/runs"
description = "List RepoMemory ingest runs."
